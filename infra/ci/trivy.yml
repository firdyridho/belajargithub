name: Security Scan (SAST)

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  trivy:
    name: Trivy Secret & Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (repo-wide)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

      - name: Run Trivy (secret detection)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: 1
