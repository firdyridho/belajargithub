upstream tiss_api {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name tiss.or.id www.tiss.or.id blog.tiss.or.id academy.tiss.or.id lms.tiss.or.id cms.tiss.or.id admin.tiss.or.id auth.tiss.or.id monitor.tiss.or.id status.tiss.or.id api.tiss.or.id;

    location / {
        proxy_pass http://tiss_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
